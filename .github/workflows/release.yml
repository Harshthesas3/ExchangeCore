name: Build & Release ExchangeCore

on:
  push:
    branches:
      - main
    tags:
      - "v*"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Windows Release
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug trigger
        shell: pwsh
        run: |
          Write-Host "Event      : ${{ github.event_name }}"
          Write-Host "Ref        : ${{ github.ref }}"
          Write-Host "Ref Name   : ${{ github.ref_name }}"

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Run Tests
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Prepare Release Folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release

          Copy-Item build/Release/ExchangeCoreApp.exe release/

          if (Test-Path README.md) {
            Copy-Item README.md release/
          }

          if (Test-Path LICENSE) {
            Copy-Item LICENSE release/
          }

          if (Test-Path assets) {
            Copy-Item assets release -Recurse
          }

          if (Test-Path config) {
            Copy-Item config release -Recurse
          }

      - name: Create ZIP
        shell: pwsh
        run: |
          Compress-Archive `
            -Path release/* `
            -DestinationPath ExchangeCore-Windows.zip `
            -Force

      - name: Upload Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ExchangeCore-Windows
          path: ExchangeCore-Windows.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ExchangeCore-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
