name: Build ExchangeCore

on:
  push:
    branches:
      - main
    tags:
      - "v*"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Run Tests
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Create Release Folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release

          Copy-Item build/Release/ExchangeCoreApp.exe release/

          if (Test-Path README.md) {
            Copy-Item README.md release/
          }

          if (Test-Path LICENSE) {
            Copy-Item LICENSE release/
          }

      - name: Create ZIP
        shell: pwsh
        run: |
          Compress-Archive `
            -Path release/* `
            -DestinationPath ExchangeCore-Windows.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ExchangeCore-Windows
          path: ExchangeCore-Windows.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ExchangeCore-Windows.zip
